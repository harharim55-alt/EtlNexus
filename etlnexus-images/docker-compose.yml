services:
  # ============================================
  # Core Services
  # ============================================
  db:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etlnexus}
      POSTGRES_USER: ${POSTGRES_USER:-etlnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etlnexus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etlnexus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    image: etlnexus-backend
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-etlnexus}:${POSTGRES_PASSWORD:-etlnexus}@db:5432/${POSTGRES_DB:-etlnexus}
      OASIS_PROD_DATABASE_URL: postgresql+asyncpg://oasis-prod-db:5432/oasis_prod
      OASIS_PROD_USERNAME: oasis
      OASIS_PROD_PASSWORD: oasis
      REDIS_URL: redis://redis:6379/0
      SSO_PUBLIC_ISSUER_URL: http://${HOSTNAME:-localhost}:8090/realms/etlnexus
      CORS_ORIGINS: '["http://localhost:5173","http://${HOSTNAME:-localhost}:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      oasis-prod-db:
        condition: service_healthy
      iceberg-data-seed:
        condition: service_completed_successfully
  frontend:
    container_name: frontend
    image: etlnexus-frontend
    environment:
      VITE_AIRFLOW_URL: http://${HOSTNAME:-localhost}:8080
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - backend
  oasis-prod-db:
    container_name: oasis-prod-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oasis_prod
      POSTGRES_USER: oasis
      POSTGRES_PASSWORD: oasis
    volumes:
      - oasis-pgdata:/var/lib/postgresql/data
      - ./dev/seeds/oasis_prod_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oasis -d oasis_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Dev-only: Airflow (for testing)
  # ============================================
  airflow-db:
    container_name: airflow-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    container_name: airflow-init
    image: etlnexus-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: etlnexus-dev-key
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./dev/dags:/opt/airflow/dags
      - ./dev/seeds/etl_code:/data/etl-code
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true"
    depends_on:
      airflow-db:
        condition: service_healthy

  airflow-webserver:
    container_name: airflow-webserver
    image: etlnexus-airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: etlnexus-dev-key
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
    volumes:
      - ./dev/dags:/opt/airflow/dags
      - ./dev/seeds/etl_code:/data/etl-code
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    container_name: airflow-scheduler
    image: etlnexus-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: etlnexus-dev-key
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
    volumes:
      - ./dev/dags:/opt/airflow/dags
      - ./dev/seeds/etl_code:/data/etl-code
      - iceberg-warehouse:/tmp/warehouse
    tmpfs:
      - /tmp/spark-events:mode=1777
    command: bash -c "umask 000 && airflow tasks serve-logs & exec airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ============================================
  # Dev-only: Keycloak (SSO)
  # ============================================
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8090
      KC_HOSTNAME: ${HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: 8090
    volumes:
      - ./dev/keycloak:/opt/keycloak/data/import
      - ./dev/keycloak/themes/etlnexus:/opt/keycloak/themes/etlnexus
    ports:
      - "127.0.0.1:8090:8090"

  # ============================================
  # Dev-only: Iceberg REST Catalog
  # ============================================
  iceberg-volume-init:
    container_name: iceberg-volume-init
    image: alpine:latest
    volumes:
      - iceberg-warehouse:/tmp/warehouse
    command: sh -c "chmod 1777 /tmp/warehouse"

  iceberg-rest:
    container_name: iceberg-rest
    image: tabulario/iceberg-rest:latest
    environment:
      CATALOG_WAREHOUSE: /tmp/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.io.ResolvingFileIO
    volumes:
      - iceberg-warehouse:/tmp/warehouse
    ports:
      - "127.0.0.1:8181:8181"
    depends_on:
      iceberg-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  iceberg-seed:
    container_name: iceberg-seed
    image: python:3.12-slim
    environment:
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
    volumes:
      - ./dev/seeds:/seeds
    command: python /seeds/seed_iceberg.py
    depends_on:
      iceberg-rest:
        condition: service_healthy

  iceberg-data-seed:
    container_name: iceberg-data-seed
    image: etlnexus-iceberg-data-seed
    user: "0"
    environment:
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
    volumes:
      - ./dev/seeds:/seeds
      - iceberg-warehouse:/tmp/warehouse
    command: bash -c "umask 000 && python /seeds/seed_iceberg_data.py && chmod -R 777 /tmp/warehouse"
    depends_on:
      iceberg-seed:
        condition: service_completed_successfully

volumes:
  pgdata:
  airflow-pgdata:
  oasis-pgdata:
  iceberg-warehouse:
