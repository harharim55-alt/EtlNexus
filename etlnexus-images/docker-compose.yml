services:
  # ============================================
  # Core Services
  # ============================================
  db:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etlnexus}
      POSTGRES_USER: ${POSTGRES_USER:-etlnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etlnexus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etlnexus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    image: etlnexus-backend
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-etlnexus}:${POSTGRES_PASSWORD:-etlnexus}@db:5432/${POSTGRES_DB:-etlnexus}
      OASIS_PROD_DATABASE_URL: postgresql+asyncpg://oasis-prod-db:5432/oasis_prod
      OASIS_PROD_USERNAME: oasis
      OASIS_PROD_PASSWORD: oasis
      SSO_PUBLIC_ISSUER_URL: http://${HOSTNAME:-localhost}:8090/realms/etlnexus
      CORS_ORIGINS: '["http://localhost:5173","http://${HOSTNAME:-localhost}:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      oasis-prod-db:
        condition: service_healthy
      seed-data:
        condition: service_completed_successfully
      spark-connect:
        condition: service_healthy
  frontend:
    container_name: frontend
    image: etlnexus-frontend
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - backend
  oasis-prod-db:
    container_name: oasis-prod-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oasis_prod
      POSTGRES_USER: oasis
      POSTGRES_PASSWORD: oasis
    volumes:
      - oasis-pgdata:/var/lib/postgresql/data
      - ./dev/seeds/oasis_prod_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oasis -d oasis_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Dev-only: Keycloak (SSO)
  # ============================================
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8090
      KC_HOSTNAME: ${HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: 8090
    volumes:
      - ./dev/keycloak:/opt/keycloak/data/import
      - ./dev/keycloak/themes/etlnexus:/opt/keycloak/themes/etlnexus
    ports:
      - "127.0.0.1:8090:8090"

  # ============================================
  # Dev-only: Spark Connect server (Iceberg hadoop catalog, no REST)
  # ============================================
  spark-volume-init:
    container_name: spark-volume-init
    image: alpine:latest
    volumes:
      - iceberg-warehouse:/tmp/warehouse
    command: sh -c "chmod 1777 /tmp/warehouse"

  spark-connect:
    container_name: spark-connect
    image: etlnexus-spark-connect
    environment:
      SPARK_WAREHOUSE: /tmp/warehouse
    volumes:
      - iceberg-warehouse:/tmp/warehouse
    ports:
      - "127.0.0.1:15002:15002"
    depends_on:
      spark-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/15002'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # Schema seed: creates empty Iceberg tables via local Spark (hadoop catalog).
  seed-schema:
    container_name: seed-schema
    image: etlnexus-spark-connect
    user: "0"
    environment:
      SPARK_WAREHOUSE: /tmp/warehouse
    volumes:
      - ./dev/seeds:/seeds
      - iceberg-warehouse:/tmp/warehouse
    command: bash -c "umask 000 && /opt/spark/bin/spark-submit --packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.1 --conf spark.jars.ivy=/opt/spark/.ivy2 /seeds/seed_iceberg.py && chmod -R 777 /tmp/warehouse"
    depends_on:
      spark-volume-init:
        condition: service_completed_successfully

  # Data seed: populates a subset of tables with sample rows via local Spark.
  seed-data:
    container_name: seed-data
    image: etlnexus-spark-connect
    user: "0"
    environment:
      SPARK_WAREHOUSE: /tmp/warehouse
    volumes:
      - ./dev/seeds:/seeds
      - iceberg-warehouse:/tmp/warehouse
    command: bash -c "umask 000 && /opt/spark/bin/spark-submit --packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.1 --conf spark.jars.ivy=/opt/spark/.ivy2 /seeds/seed_iceberg_data.py && chmod -R 777 /tmp/warehouse"
    depends_on:
      seed-schema:
        condition: service_completed_successfully

volumes:
  pgdata:
  oasis-pgdata:
  iceberg-warehouse:
