services:
  # ============================================
  # Core Services
  # ============================================
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: etlnexus
      POSTGRES_USER: etlnexus
      POSTGRES_PASSWORD: etlnexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etlnexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://etlnexus:etlnexus@db:5432/etlnexus
    volumes:
      - etl-repo-data:/data/etl-repo
      - dev-git-repo:/data/dev-repo
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      dev-git-repo:
        condition: service_completed_successfully
      iceberg-seed:
        condition: service_completed_successfully
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    command: pnpm dev --host 0.0.0.0
    ports:
      - "5173:5173"
    # VITE_API_BASE_URL defaults to /api which proxies through Vite to backend:8000
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json

  # ============================================
  # Dev-only: Airflow (for testing)
  # ============================================
  airflow-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.10.4-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./dev/dags:/opt/airflow/dags
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true"
    depends_on:
      airflow-db:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    volumes:
      - ./dev/dags:/opt/airflow/dags
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dev/dags:/opt/airflow/dags
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ============================================
  # Dev-only: Iceberg REST Catalog
  # ============================================
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    environment:
      CATALOG_WAREHOUSE: /tmp/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.io.ResolvingFileIO
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  iceberg-seed:
    image: python:3.12-slim
    volumes:
      - ./dev/seeds:/seeds
    command: python /seeds/seed_iceberg.py
    depends_on:
      iceberg-rest:
        condition: service_healthy

  # ============================================
  # Dev-only: Seed a bare Git repo with sample ETL files
  # ============================================
  dev-git-repo:
    image: alpine/git:latest
    volumes:
      - dev-git-repo:/data/dev-repo
      - ./dev/seeds:/seeds
    entrypoint: /bin/sh
    command: >
      -c "
        if [ ! -d /data/dev-repo/.git ]; then
          cd /data/dev-repo &&
          git init -b main &&
          git config user.email 'dev@etlnexus.local' &&
          git config user.name 'Dev Seed' &&
          cp -r /seeds/etl_code/* . 2>/dev/null || mkdir -p dagger &&
          git add -A &&
          git commit -m 'Initial seed' || true
        fi
      "

volumes:
  pgdata:
  airflow-pgdata:
  etl-repo-data:
  dev-git-repo:
