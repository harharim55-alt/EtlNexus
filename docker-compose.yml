services:
  # ============================================
  # Core Services
  # ============================================
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: etlnexus
      POSTGRES_USER: etlnexus
      POSTGRES_PASSWORD: etlnexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etlnexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://etlnexus:etlnexus@db:5432/etlnexus
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      iceberg-data-seed:
        condition: service_completed_successfully
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "5173:80"
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/public
        - action: rebuild
          path: ./frontend/package.json

  # ============================================
  # Dev-only: Airflow (for testing)
  # ============================================
  airflow-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ./dev/airflow
      dockerfile: Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: etlnexus-dev-key
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./dev/dags:/opt/airflow/dags
      - ./dev/seeds/etl_code:/data/etl-code
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true"
    depends_on:
      airflow-db:
        condition: service_healthy

  airflow-webserver:
    build:
      context: ./dev/airflow
      dockerfile: Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: etlnexus-dev-key
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    volumes:
      - ./dev/dags:/opt/airflow/dags
      - ./dev/seeds/etl_code:/data/etl-code
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: ./dev/airflow
      dockerfile: Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: etlnexus-dev-key
    volumes:
      - ./dev/dags:/opt/airflow/dags
      - ./dev/seeds/etl_code:/data/etl-code
      - iceberg-warehouse:/tmp/warehouse
    tmpfs:
      - /tmp/spark-events:mode=1777
    command: bash -c "umask 000 && airflow tasks serve-logs & exec airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ============================================
  # Dev-only: Iceberg REST Catalog
  # ============================================
  iceberg-volume-init:
    image: alpine:latest
    volumes:
      - iceberg-warehouse:/tmp/warehouse
    command: sh -c "chmod 1777 /tmp/warehouse"

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    environment:
      CATALOG_WAREHOUSE: /tmp/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.io.ResolvingFileIO
    volumes:
      - iceberg-warehouse:/tmp/warehouse
    ports:
      - "8181:8181"
    depends_on:
      iceberg-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  iceberg-seed:
    image: python:3.12-slim
    volumes:
      - ./dev/seeds:/seeds
    command: python /seeds/seed_iceberg.py
    depends_on:
      iceberg-rest:
        condition: service_healthy

  iceberg-data-seed:
    build:
      context: ./dev/airflow
      dockerfile: Dockerfile
    user: "0"
    volumes:
      - ./dev/seeds:/seeds
      - iceberg-warehouse:/tmp/warehouse
    command: bash -c "umask 000 && python /seeds/seed_iceberg_data.py && chmod -R 777 /tmp/warehouse"
    depends_on:
      iceberg-seed:
        condition: service_completed_successfully

volumes:
  pgdata:
  airflow-pgdata:
  iceberg-warehouse:
