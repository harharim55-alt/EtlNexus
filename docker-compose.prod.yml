services:
  db:
    container_name: db
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=200"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etlnexus}
      POSTGRES_USER: ${POSTGRES_USER:-etlnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etlnexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend-api:
    image: etlnexus-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-etlnexus}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}@db:5432/${POSTGRES_DB:-etlnexus}
      SCHEDULER_ENABLED: "false"
      REDIS_URL: redis://redis:6379/0
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  backend-scheduler:
    image: etlnexus-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-etlnexus}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}@db:5432/${POSTGRES_DB:-etlnexus}
      SCHEDULER_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
    networks:
      - backend
      - database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    container_name: frontend
    image: etlnexus-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    environment:
      VITE_AIRFLOW_URL: ${VITE_AIRFLOW_URL:-}
      BACKEND_HOST: backend-api
    networks:
      - frontend
      - backend
    ports:
      - "80:80"
    depends_on:
      - backend-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db-backup:
    container_name: db-backup
    image: postgres:16-alpine
    networks:
      - database
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts/backup-db.sh:/scripts/backup-db.sh:ro
      - ./scripts/backup-cron-entry.sh:/scripts/backup-cron-entry.sh:ro
      - db-backups:/backups
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-etlnexus}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      PGDATABASE: ${POSTGRES_DB:-etlnexus}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
    entrypoint: /scripts/backup-cron-entry.sh
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  db-backups:

networks:
  frontend:
  backend:
  database:
