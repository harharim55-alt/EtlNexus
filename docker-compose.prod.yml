services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: etlnexus
      POSTGRES_USER: etlnexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etlnexus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etlnexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://etlnexus:${POSTGRES_PASSWORD:-etlnexus}@db:5432/etlnexus
    volumes:
      - etl-repo-data:/data/etl-repo
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  etl-repo-data:
